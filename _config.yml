  - title: Projects
    layout: list
    content:
      - layout: left
        border: weak
        title: 강화학습 기반 매니퓰레이터 제어
        link: https://youtu.be/aYh6vtJ8Pfc
        link_text: 프로젝트 시연 영상
        additional_links:
          - title: GitHub Repo
            icon: fab fa-github
            url: https://github.com/kemjensak/hrl_manipulation
        quote: >
          시야가 가려진 물체를 탐색하고 파지하는 계층적 강화학습 기반의 매니퓰레이션 제어
        description: |
          Isaac Sim과 Panda 7-DoF 로봇 팔을 활용하여 복잡한 환경에서 목표 물체를 탐색·파지하는 강화학습 기반 알고리즘을 개발. Observation space, reward function 설계 및 튜닝을 직접 수행.

      - layout: left
        border: weak
        title: 자율주행 AES 평가 프레임워크 개발
        link: https://youtu.be/BA3w1iJNDIU
        link_text: AES 시뮬레이션 영상
        quote: >
          고속도로 주행 중 긴급 장애물 회피 시나리오 기반 AES 평가 방법 개발
        description: |
          CARLA, Autoware, ROS 기반으로 자율주행 시뮬레이션 환경을 구성하고, 긴급 회피 성능을 정량적으로 평가할 수 있는 프레임워크를 구축. 해당 연구로 자동차안전학회 학술상 수상.

      - layout: left
        border: weak
