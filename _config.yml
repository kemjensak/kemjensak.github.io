about_content: |
  로봇 개발자를 꿈꾸며 기계공학을 전공한 김진석입니다. 학부와 대학원에서 로보틱스, 자율주행, 심층강화학습을 연구하며 로봇의 제어 알고리즘부터 실제 하드웨어 설계까지 전반을 다루는 경험을 쌓았습니다.

  ROS, ROS2 기반 제어 시스템 개발, 센서 융합을 통한 자율주행, 강화학습 기반 매니퓰레이터 제어 등 다양한 프로젝트를 수행하였고, 이를 통해 하드웨어와 소프트웨어를 유기적으로 융합하여 실제 문제를 해결하는 능력을 키웠습니다.

  저는 기술을 통한 문제 해결뿐만 아니라 협업과 창의적 사고를 바탕으로 새로운 가치를 만들어가는 것을 중요하게 생각합니다. 앞으로도 다양한 산업의 기술 혁신에 기여하는 로봇 엔지니어가 되고자 합니다.

